name: 'Laravel .env Secret Replacer'
description: '.env に存在するキーを対象に、GitHub Secrets の値で置換する'

inputs:
  secrets:
    description: 'すべての Secrets を JSON で渡す。${{ toJSON(secrets) }} を使用'
    required: true
  env-file:
    description: '対象の .env ファイルのパス'
    default: '.env'
  env-example:
    description: '.env.example のパス（copy-from-example が true の場合に使用）'
    default: '.env.example'
  copy-from-example:
    description: '置換前に .env.example を .env としてコピーする（true/false）'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Replace .env values with GitHub Secrets
      shell: bash
      env:
        INPUT_SECRETS: ${{ inputs.secrets }}
        INPUT_ENV_FILE: ${{ inputs.env-file }}
        INPUT_ENV_EXAMPLE: ${{ inputs.env-example }}
        INPUT_COPY_FROM_EXAMPLE: ${{ inputs.copy-from-example }}
      run: php "${{ github.action_path }}/scripts/replace_env.php"
