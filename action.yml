name: 'Laravel .env Secret Replacer'
description: 'Replaces .env values with GitHub Secrets for keys that exist in .env'

inputs:
  secrets:
    description: 'All secrets as JSON. Pass ${{ toJSON(secrets) }}'
    required: true
  env-file:
    description: 'Path to the target .env file'
    default: '.env'
  env-example:
    description: 'Path to .env.example (required when copy-from-example is true)'
    default: '.env.example'
  copy-from-example:
    description: 'Copy .env.example to .env before replacing values (true/false)'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Replace .env values with GitHub Secrets
      shell: bash
      env:
        INPUT_SECRETS: ${{ inputs.secrets }}
        INPUT_ENV_FILE: ${{ inputs.env-file }}
        INPUT_ENV_EXAMPLE: ${{ inputs.env-example }}
        INPUT_COPY_FROM_EXAMPLE: ${{ inputs.copy-from-example }}
      run: php "${{ github.action_path }}/scripts/replace_env.php"
